<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Agent — AI 测试用例生成</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js" defer></script>
<style>
/* ═══════════════════════════════════════════
   CSS Variables — 设计系统
   ═══════════════════════════════════════════ */
:root {
  --bg-deep: #08080a;
  --bg-base: #0e0e11;
  --bg-surface: #16161a;
  --bg-elevated: #1c1c21;
  --bg-hover: #222228;

  --text-primary: #ededef;
  --text-secondary: #8b8b96;
  --text-tertiary: #55555f;

  --accent: #c084fc;
  --accent-soft: rgba(192, 132, 252, 0.12);
  --accent-medium: rgba(192, 132, 252, 0.25);

  --success: #34d399;
  --success-soft: rgba(52, 211, 153, 0.12);
  --warning: #fbbf24;
  --warning-soft: rgba(251, 191, 36, 0.12);
  --error: #f87171;
  --error-soft: rgba(248, 113, 113, 0.12);

  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.1);

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;

  --font-sans: 'Geist', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  --header-h: 56px;
  --composer-h: 120px;
}

/* ═══════════════════════════════════════════
   Reset & Base
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
}

::selection { background: var(--accent-medium); color: var(--text-primary); }

/* ═══════════════════════════════════════════
   Activity Bar (左导航)
   ═══════════════════════════════════════════ */
.activity-bar {
  width: 72px;
  min-width: 72px;
  height: 100vh;
  background: var(--bg-base);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 20;
}

.activity-bar-top {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border);
  width: 100%;
}

.activity-logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  color: #000;
}

.activity-bar-items {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 8px;
  gap: 2px;
}

.activity-bar-bottom {
  padding: 8px 0 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.activity-item {
  width: 100%;
  height: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  font-size: 1.15rem;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.activity-item:hover {
  background: var(--bg-hover);
}

.activity-item.active {
  border-left-color: var(--accent);
  background: var(--accent-soft);
}

.activity-label {
  font-size: 0.6rem;
  font-family: var(--font-sans);
  color: var(--text-tertiary);
  line-height: 1;
}

.activity-item.active .activity-label {
  color: var(--accent);
}

.btn-new {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-family: var(--font-sans);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-new:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-hover);
}

/* ═══════════════════════════════════════════
   History Panel (右侧历史对话)
   ═══════════════════════════════════════════ */
.history-panel {
  width: 240px;
  min-width: 240px;
  height: 100vh;
  background: var(--bg-base);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 15;
  transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1),
              min-width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.history-panel.collapsed {
  width: 0;
  min-width: 0;
  overflow: hidden;
  border-left: none;
}

.history-header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.history-title {
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.history-list::-webkit-scrollbar { width: 4px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

.conv-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
}
.conv-item:hover { background: var(--bg-elevated); }
.conv-item.active { background: var(--bg-elevated); border: 1px solid var(--border); }
.conv-item-title {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.conv-item-meta {
  font-size: 0.72rem;
  color: var(--text-tertiary);
  margin-top: 3px;
}

.history-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 0.72rem;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════
   Main Area
   ═══════════════════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 0;
}

.main-header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(8, 8, 10, 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn-toggle-sidebar {
  display: none;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 4px;
}

.header-title {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-primary);
}

.header-badge {
  padding: 2px 8px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 99px;
  font-size: 0.7rem;
  font-weight: 500;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-icon {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-icon:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
  border-color: var(--border-hover);
}

/* ═══════════════════════════════════════════
   Message Stream
   ═══════════════════════════════════════════ */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.messages::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

.messages-inner {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 32px;
}

/* Welcome state */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 60px 32px;
  text-align: center;
  animation: fadeIn 0.6s ease;
}

.welcome-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 700;
  color: #000;
  margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(192, 132, 252, 0.2);
}

.welcome h1 {
  font-size: 1.6rem;
  font-weight: 600;
  letter-spacing: -0.03em;
  margin-bottom: 8px;
}

.welcome p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  max-width: 400px;
  line-height: 1.6;
  margin-bottom: 32px;
}

.quick-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  max-width: 460px;
  width: 100%;
}

.quick-action {
  padding: 14px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-sans);
}
.quick-action:hover {
  background: var(--bg-elevated);
  border-color: var(--border-hover);
  transform: translateY(-1px);
}
.quick-action-icon {
  font-size: 1.1rem;
  margin-bottom: 6px;
}
.quick-action-text {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.4;
}

/* Message bubbles */
.msg {
  margin-bottom: 24px;
  animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.msg-user {
  display: flex;
  justify-content: flex-end;
}

.msg-user .msg-bubble {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
  padding: 14px 18px;
  max-width: 85%;
  font-size: 0.9rem;
  line-height: 1.6;
  white-space: pre-wrap;
}

.msg-assistant .msg-bubble {
  padding: 4px 0;
  max-width: 100%;
}

.msg-assistant .msg-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-tertiary);
}

.msg-assistant .msg-label-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

.msg-content {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text-primary);
}

.msg-content h3 {
  font-size: 0.95rem;
  font-weight: 600;
  margin: 16px 0 8px;
  letter-spacing: -0.01em;
}

.msg-content p { margin-bottom: 10px; }

/* Pipeline steps */
.pipeline {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin: 12px 0;
}

.pipeline-step {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  color: var(--text-secondary);
  transition: all 0.3s;
}

.pipeline-step.active {
  background: var(--accent-soft);
  color: var(--accent);
}

.pipeline-step.done {
  color: var(--success);
}

.pipeline-step .step-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  flex-shrink: 0;
  border: 1.5px solid currentColor;
}

.pipeline-step.active .step-icon {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.pipeline-step.done .step-icon {
  background: var(--success-soft);
  border-color: var(--success);
}

.pipeline-step .step-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--accent-soft);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

.pipeline-step .step-label { flex: 1; }
.pipeline-step .step-detail {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  opacity: 0.7;
}

/* Tables */
.test-table-wrap {
  overflow-x: auto;
  margin: 12px 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}

.test-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.test-table th {
  padding: 10px 14px;
  text-align: left;
  font-weight: 500;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-tertiary);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.test-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
  vertical-align: top;
  line-height: 1.5;
}

.test-table tr:last-child td { border-bottom: none; }
.test-table tr:hover td { background: var(--bg-surface); }

.test-table .cell-id {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-tertiary);
  white-space: nowrap;
}

.test-table .cell-title {
  color: var(--text-primary);
  font-weight: 500;
  white-space: nowrap;
}

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 0.7rem;
  font-weight: 500;
  white-space: nowrap;
}
.tag-P0 { background: var(--error-soft); color: var(--error); }
.tag-P1 { background: var(--warning-soft); color: var(--warning); }
.tag-P2 { background: rgba(96, 165, 250, 0.12); color: #60a5fa; }
.tag-P3 { background: rgba(148, 163, 184, 0.12); color: #94a3b8; }
.tag-type { background: var(--accent-soft); color: var(--accent); }

/* Summary cards */
.summary-row {
  display: flex;
  gap: 10px;
  margin: 16px 0;
  flex-wrap: wrap;
}

.summary-card {
  flex: 1;
  min-width: 120px;
  padding: 14px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}

.summary-card-label {
  font-size: 0.7rem;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}

.summary-card-value {
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.summary-card-value.text-accent { color: var(--accent); }
.summary-card-value.text-success { color: var(--success); }

/* ═══════════════════════════════════════════
   Composer
   ═══════════════════════════════════════════ */
.composer-wrap {
  padding: 0 24px 24px;
}

.composer {
  max-width: 780px;
  margin: 0 auto;
  position: relative;
}

.composer-box {
  display: flex;
  flex-direction: column;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: border-color 0.2s;
}

.composer-box:focus-within {
  border-color: var(--accent-medium);
}

.composer-box textarea {
  width: 100%;
  min-height: 52px;
  max-height: 200px;
  padding: 16px 18px 8px;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.9rem;
  line-height: 1.6;
  resize: none;
}

.composer-box textarea::placeholder {
  color: var(--text-tertiary);
}

.composer-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px 10px;
}

.composer-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}

.btn-composer {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text-tertiary);
  font-family: var(--font-sans);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-composer:hover {
  background: var(--bg-elevated);
  color: var(--text-secondary);
}

.btn-send {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #000;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-send:hover {
  background: #d4a0ff;
  transform: scale(1.05);
}
.btn-send:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
}

.composer-hint {
  text-align: center;
  margin-top: 8px;
  font-size: 0.7rem;
  color: var(--text-tertiary);
}

/* ═══════════════════════════════════════════
   Animations
   ═══════════════════════════════════════════ */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.typing-indicator span {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--text-tertiary);
  border-radius: 50%;
  margin: 0 2px;
  animation: pulse 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

/* Module section headers */
.module-section {
  margin: 20px 0 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

/* Coverage bar */
.coverage-bar-wrap {
  margin: 8px 0;
}
.coverage-bar-bg {
  height: 6px;
  background: var(--bg-elevated);
  border-radius: 3px;
  overflow: hidden;
}
.coverage-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), #a855f7);
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ═══════════════════════════════════════════
   Responsive
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
  .history-panel {
    position: fixed;
    right: 0;
    top: 0;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 25;
  }
  .history-panel.open { transform: translateX(0); }
  .history-panel.collapsed { width: 0; min-width: 0; }
  .btn-toggle-sidebar { display: flex; }
  .history-toggle-btn { display: none; }
  .messages-inner { padding: 0 16px; }
  .composer-wrap { padding: 0 12px 16px; }
  .quick-actions { grid-template-columns: 1fr; }
  .summary-row { flex-direction: column; }
}

/* ═══════════════════════════════════════════
   Cases View — 测试用例面板
   ═══════════════════════════════════════════ */
.cases-view {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

.cases-view.active { display: flex; }

.cases-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0 24px;
}

.cases-tab {
  padding: 12px 16px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-tertiary);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font-sans);
}

.cases-tab:hover { color: var(--text-secondary); }
.cases-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.cases-filter-bar {
  display: flex;
  gap: 8px;
  padding: 12px 24px;
  flex-wrap: wrap;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  align-items: center;
}

.filter-select {
  padding: 6px 10px;
  background: var(--bg-elevated);

// ═══════════════════════════════════════════
// Real API Call (SSE streaming)
// ═══════════════════════════════════════════
async function callGenerateAPI(prdText) {
  return new Promise((resolve, reject) => {
    const es = new EventSource('/api/generate?' + new URLSearchParams({ prd: prdText }));

    // 由于 SSE 不支持 POST body，改用 fetch + 读流
    es.close();

    fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prd: prdText }),
    }).then(async (response) => {
      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: '请求失败' }));
        reject(new Error(err.error || '请求失败'));
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      const result = { analysis: null, cases: [], review: null };

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('event: ')) {
            var eventType = line.slice(7).trim();
          } else if (line.startsWith('data: ')) {
            const data = JSON.parse(line.slice(6));

            if (eventType === 'step') {
              updatePipelineStep(data);
            } else if (eventType === 'done') {
              result.analysis = data.analysis;
              result.cases = data.cases;
              result.review = data.review;
            } else if (eventType === 'error') {
              reject(new Error(data.message));
              return;
            }
          }
        }
      }

      resolve(result);
    }).catch(reject);
  });
}

function updatePipelineStep(data) {
  const { step, status, detail } = data;
  const stepEl = document.getElementById(`step-${step}`);
  const spinnerEl = document.getElementById(`spinner-${step}`);
  const detailEl = document.getElementById(`detail-${step}`);

  if (status === 'running') {
    stepEl.classList.add('active');
    spinnerEl.style.display = 'block';
    // 激活下一步的 spinner
    if (step < 2) {
      // 当前步骤正在跑
    }
  } else if (status === 'done') {
    stepEl.classList.remove('active');
    stepEl.classList.add('done');
    spinnerEl.style.display = 'none';
    detailEl.textContent = detail;
    stepEl.querySelector('.step-icon').textContent = '✓';
    // 激活下一步
    if (step < 2) {
      const nextStep = document.getElementById(`step-${step + 1}`);
      const nextSpinner = document.getElementById(`spinner-${step + 1}`);
      nextStep.classList.add('active');
      nextSpinner.style.display = 'block';
    }
  }
}

// ═══════════════════════════════════════════
// Results Rendering (真实数据)
// ═══════════════════════════════════════════
let lastGeneratedCases = []; // 保存最后生成的用例，供导出使用

function renderRealResults(analysis, cases, review) {
  lastGeneratedCases = cases || [];
  const modules = [...new Set((cases || []).map(c => c.module))];
  const p0Count = (cases || []).filter(c => c.priority === 'P0').length;
  const coverageScore = review?.coverageScore ? Math.round(review.coverageScore * 100) : 0;

  let html = `
  <div class="msg msg-assistant" style="animation:msgIn 0.4s cubic-bezier(0.16,1,0.3,1)">
    <div class="msg-bubble">
      <div class="msg-label"><span class="msg-label-dot"></span>Test Agent · 生成完成</div>

      <div class="summary-row">
        <div class="summary-card">
          <div class="summary-card-label">功能点</div>
          <div class="summary-card-value text-accent">${analysis?.features?.length || 0}</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">测试用例</div>
          <div class="summary-card-value">${cases?.length || 0}</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">P0 冒烟</div>
          <div class="summary-card-value" style="color:var(--error)">${p0Count}</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">覆盖率</div>
          <div class="summary-card-value text-success">${coverageScore}%</div>
        </div>
        <div class="summary-card" style="cursor:pointer" onclick="switchView('cases')">
          <div class="summary-card-label">查看详情</div>
          <div class="summary-card-value" style="font-size:0.95rem;color:var(--accent)">查看用例 →</div>
        </div>
      </div>

      <div class="coverage-bar-wrap">
        <div class="coverage-bar-bg">
          <div class="coverage-bar-fill" style="width:${coverageScore}%"></div>
        </div>
      </div>`;

  // 按模块分组渲染表格
  for (const mod of modules) {
    const modCases = cases.filter(c => c.module === mod);
    html += `<div class="module-section">${escapeHtml(mod)}（${modCases.length} 条）</div>`;
    html += `<div class="test-table-wrap"><table class="test-table">
      <thead><tr><th>编号</th><th>标题</th><th>类型</th><th>优先级</th><th>前置条件</th><th>预期结果</th></tr></thead><tbody>`;
    for (const c of modCases) {
      const steps = (c.steps || []).map((s, i) => `${i + 1}. ${s}`).join('; ');
      html += `<tr>
        <td class="cell-id">${escapeHtml(c.id)}</td>
        <td class="cell-title">${escapeHtml(c.title)}</td>
        <td><span class="tag tag-type">${escapeHtml(c.caseType || c.type || '')}</span></td>
        <td><span class="tag tag-${c.priority}">${c.priority}</span></td>
        <td>${escapeHtml(c.precondition || c.pre || '')}</td>
        <td>${escapeHtml(c.expected)}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // 审核遗漏
  if (review?.missingScenarios?.length) {
    html += `<div style="margin-top:16px;font-size:0.82rem;color:var(--warning);">`;
    html += `<strong>⚠ 遗漏场景：</strong>`;
    for (const s of review.missingScenarios) {
      html += `<br>- ${escapeHtml(s)}`;
    }
    html += `</div>`;
  }

  html += `
      <div style="margin-top:16px;display:flex;gap:8px;">
        <button class="btn-new" onclick="switchView('cases')">📊 查看用例</button>
        <button class="btn-new" onclick="downloadMarkdown()">📄 下载 Markdown</button>
      </div>
    </div>
  </div>`;

  return html;
}

// ═══════════════════════════════════════════
// Utils
// ═══════════════════════════════════════════
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function escapeHtmlPlain(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  requestAnimationFrame(() => el.scrollTop = el.scrollHeight);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);padding:10px 20px;border-radius:8px;font-size:0.82rem;z-index:999;animation:msgIn 0.3s ease';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ═══════════════════════════════════════════
// View Switching — 对话 / 用例面板
// ═══════════════════════════════════════════
function switchView(view) {
  currentView = view;
  const casesView = document.getElementById('casesView');
  const messages = document.getElementById('messages');
  const composer = document.querySelector('.composer-wrap');
  const historyPanel = document.getElementById('historyPanel');
  const toggleBtn = document.getElementById('historyToggleBtn');

  // Update activity bar nav
  document.querySelectorAll('.activity-item[data-view]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });

  if (view === 'cases') {
    casesView.classList.add('active');
    messages.style.display = 'none';
    composer.style.display = 'none';
    historyPanel.style.display = 'none';
    toggleBtn.style.display = 'none';
    document.getElementById('headerTitle').textContent = '测试用例面板';
    renderCasesView();
  } else {
    casesView.classList.remove('active');
    messages.style.display = '';
    composer.style.display = '';
    historyPanel.style.display = '';
    toggleBtn.style.display = '';
    // Sync button text with panel state
    toggleBtn.textContent = historyPanel.classList.contains('collapsed') ? '<' : '>';
    const conv = conversations.find(c => c.id === currentConvId);
    document.getElementById('headerTitle').textContent = conv ? conv.title : '新的测试用例';
  }
}

// ═══════════════════════════════════════════
// Cases View — Tab Switching
// ═══════════════════════════════════════════
// Cases View — Filter / Sort / Paginate
// ═══════════════════════════════════════════
function getFilteredCases() {
  let cases = [...lastGeneratedCases];
  if (panelFilters.module) {
    cases = cases.filter(c => c.module === panelFilters.module);
  }
  if (panelFilters.priority) {
    cases = cases.filter(c => c.priority === panelFilters.priority);
  }
  if (panelFilters.type) {
    cases = cases.filter(c => (c.caseType || c.type) === panelFilters.type);
  }
  cases.sort((a, b) => {
    let va = a[panelSort.key] || '';
    let vb = b[panelSort.key] || '';
    if (panelSort.key === 'caseType') { va = a.caseType || a.type || ''; vb = b.caseType || b.type || ''; }
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return panelSort.dir === 'asc' ? -1 : 1;
    if (va > vb) return panelSort.dir === 'asc' ? 1 : -1;
    return 0;
  });
  return cases;
}

function getPaginatedCases(filtered) {
  const start = (panelPage - 1) * PANEL_PAGE_SIZE;
  return filtered.slice(start, start + PANEL_PAGE_SIZE);
}

function onFilterChange(key, value) {
  panelFilters[key] = value;
  panelPage = 1;
  renderCasesView();
}

function onSort(key) {
  if (panelSort.key === key) {
    panelSort.dir = panelSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    panelSort.key = key;
    panelSort.dir = 'asc';
  }
  renderCasesView();
}

function goToPage(page) {
  const totalPages = Math.max(1, Math.ceil(getFilteredCases().length / PANEL_PAGE_SIZE));
  if (page < 1 || page > totalPages) return;
  panelPage = page;
  renderCasesView();
}

// ═══════════════════════════════════════════
// Cases View — Render
// ═══════════════════════════════════════════
function renderCasesView() {
  const filterBar = document.getElementById('casesFilterBar');
  const content = document.getElementById('casesContent');

  // Empty state
  if (!lastGeneratedCases || lastGeneratedCases.length === 0) {
    filterBar.style.display = 'none';
    content.innerHTML = `
      <div class="cases-empty">
        <div class="cases-empty-icon">📋</div>
        <div class="cases-empty-text">暂无测试用例</div>
        <div style="font-size:0.78rem;color:var(--text-tertiary)">在 AI 对话中粘贴 PRD 文档生成测试用例</div>
      </div>`;
    return;
  }

  filterBar.style.display = '';
  filterBar.innerHTML = renderCasesFilterBar();

  const filtered = getFilteredCases();

  content.innerHTML = renderCasesTableView(filtered);
}

function renderCasesFilterBar() {
  const cases = lastGeneratedCases;
  const modules = [...new Set(cases.map(c => c.module))];
  const types = [...new Set(cases.map(c => c.caseType || c.type))];
  const filtered = getFilteredCases();

  return `
    <select class="filter-select" onchange="onFilterChange('module', this.value)">
      <option value="">全部模块</option>
      ${modules.map(m => `<option value="${escapeHtmlPlain(m)}" ${panelFilters.module === m ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('')}
    </select>
    <select class="filter-select" onchange="onFilterChange('priority', this.value)">
      <option value="">全部优先级</option>
      ${['P0','P1','P2','P3'].map(p => `<option value="${p}" ${panelFilters.priority === p ? 'selected' : ''}>${p}</option>`).join('')}
    </select>
    <select class="filter-select" onchange="onFilterChange('type', this.value)">
      <option value="">全部类型</option>
      ${types.map(t => `<option value="${escapeHtmlPlain(t)}" ${panelFilters.type === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
    </select>
    <span class="filter-count">${filtered.length} / ${cases.length} 条</span>`;
}

function renderCasesTableView(filtered) {
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PANEL_PAGE_SIZE));
  if (panelPage > totalPages) panelPage = totalPages;
  const pageCases = getPaginatedCases(filtered);

  const sortClass = (key) => `sortable ${panelSort.key === key ? panelSort.dir : ''}`;

  let html = `<div class="cases-table-wrap"><table class="test-table">
    <thead><tr>
      <th class="${sortClass('id')}" onclick="onSort('id')">编号</th>
      <th class="${sortClass('module')}" onclick="onSort('module')">模块</th>
      <th class="${sortClass('title')}" onclick="onSort('title')">标题</th>
      <th class="${sortClass('caseType')}" onclick="onSort('caseType')">类型</th>
      <th class="${sortClass('priority')}" onclick="onSort('priority')">优先级</th>
      <th>前置条件</th>
      <th>预期结果</th>
    </tr></thead><tbody>`;

  for (const c of pageCases) {
    const caseType = c.caseType || c.type || '';
    html += `<tr>
      <td class="cell-id">${escapeHtml(c.id)}</td>
      <td>${escapeHtml(c.module)}</td>
      <td class="cell-title">${escapeHtml(c.title)}</td>
      <td><span class="tag tag-type">${escapeHtml(caseType)}</span></td>
      <td><span class="tag tag-${c.priority}">${c.priority}</span></td>
      <td>${escapeHtml(c.precondition || c.pre || '')}</td>
      <td>${escapeHtml(c.expected)}</td>
    </tr>`;
  }

  html += `</tbody></table></div>`;

  if (totalPages > 1) {
    html += renderPagination(total, totalPages);
  }

  return html;
}

function renderPagination(total, totalPages) {
  const start = (panelPage - 1) * PANEL_PAGE_SIZE + 1;
  const end = Math.min(panelPage * PANEL_PAGE_SIZE, total);

  let html = `<div class="pagination">`;
  html += `<button onclick="goToPage(${panelPage - 1})" ${panelPage === 1 ? 'disabled' : ''}>‹</button>`;

  let startPage = Math.max(1, panelPage - 2);
  let endPage = Math.min(totalPages, startPage + 4);
  if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

  for (let i = startPage; i <= endPage; i++) {
    html += `<button class="${i === panelPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
  }

  html += `<button onclick="goToPage(${panelPage + 1})" ${panelPage === totalPages ? 'disabled' : ''}>›</button>`;
  html += `<span class="pagination-info">${start}-${end} / ${total}</span>`;
  html += `</div>`;
  return html;
}





// ═══════════════════════════════════════════
// Downloads
// ═══════════════════════════════════════════

function generateMarkdown(cases) {
  let text = '# \u6d4b\u8bd5\u7528\u4f8b\u62a5\u544a\n\n';
  const modules = [...new Set(cases.map(c => c.module))];
  for (const mod of modules) {
    const modCases = cases.filter(c => c.module === mod);
    text += '## ' + mod + '\n\n';
    text += '| \u7f16\u53f7 | \u6807\u9898 | \u7c7b\u578b | \u4f18\u5148\u7ea7 | \u524d\u7f6e\u6761\u4ef6 | \u9884\u671f\u7ed3\u679c |\n';
    text += '|------|------|------|--------|----------|----------|\n';
    for (const tc of modCases) {
      const ctype = tc.caseType || tc.type || "";
      const pre = tc.precondition || tc.pre || "";
      text += '| ' + tc.id + ' | ' + tc.title + ' | ' + ctype + ' | ' + tc.priority + ' | ' + pre + ' | ' + tc.expected + '|\n';
    }
    text += '\n';
  }
  return text;
}


function downloadMarkdown() {
  const md = generateMarkdown(lastGeneratedCases);
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'test-cases.md';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Markdown 文件已下载');
}

function downloadXlsx() {
  if (typeof XLSX === 'undefined') {
    showToast('Excel 库加载中，请稍后重试');
    return;
  }
  const cases = lastGeneratedCases;
  const rows = cases.map(c => ({
    '编号': c.id,
    '模块': c.module,
    '标题': c.title,
    '类型': c.caseType || c.type || '',
    '优先级': c.priority,
    '前置条件': c.precondition || c.pre || '',
    '操作步骤': Array.isArray(c.steps) ? c.steps.map((s, i) => `${i+1}. ${s}`).join('\n') : (c.steps || ''),
    '预期结果': c.expected,
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    { wch: 10 },  // 编号
    { wch: 14 },  // 模块
    { wch: 32 },  // 标题
    { wch: 10 },  // 类型
    { wch: 10 },  // 优先级
    { wch: 28 },  // 前置条件
    { wch: 36 },  // 操作步骤
    { wch: 28 },  // 预期结果
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '测试用例');
  XLSX.writeFile(wb, 'test-cases.xlsx');
  showToast('Excel 文件已下载');
}
